name: Release Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows archive
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"
          cache: "pip"
          cache-dependency-path: |
            requirements-build.txt
            requirements.txt

      - name: Build portable Windows archive
        shell: pwsh
        run: ./build-windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyVault-win-x64
          path: |
            release/ProxyVault-win-x64.zip
            release/SHA256SUMS.txt
          if-no-files-found: error

  build-macos:
    name: Build macOS archive
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"
          cache: "pip"
          cache-dependency-path: |
            requirements-build.txt
            requirements.txt

      - name: Build portable macOS archive
        shell: bash
        run: |
          chmod +x ./build-macos.sh
          ./build-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyVault-macos-universal2
          path: |
            release/ProxyVault-macos-universal2.zip
            release/SHA256SUMS.txt
          if-no-files-found: error
