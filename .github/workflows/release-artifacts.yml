name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to upload build artifacts to
        required: false
  push:
    branches:
      - main
    tags:
      - v*
  release:
    types:
      - published
      - edited

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows archive
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"
          cache: "pip"
          cache-dependency-path: |
            requirements-build.txt
            requirements.txt

      - name: Build portable Windows archive
        shell: pwsh
        run: ./build-windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyVault-win-x64
          path: |
            release/ProxyVault-win-x64.zip
            release/SHA256SUMS.txt
          if-no-files-found: error

  build-macos:
    name: Build macOS ${{ matrix.label }} archive
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: arm64
            pyinstaller_target_arch: arm64
            release_tag: arm64
          - runner: macos-15-intel
            label: x64
            pyinstaller_target_arch: x86_64
            release_tag: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"
          cache: "pip"
          cache-dependency-path: |
            requirements-build.txt
            requirements.txt

      - name: Build portable macOS archive
        shell: bash
        env:
          MACOS_RELEASE_TAG: ${{ matrix.release_tag }}
          PYINSTALLER_TARGET_ARCH: ${{ matrix.pyinstaller_target_arch }}
        run: |
          chmod +x ./build-macos.sh
          ./build-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyVault-macos-${{ matrix.release_tag }}
          path: |
            release/ProxyVault-macos-${{ matrix.release_tag }}.zip
            release/SHA256SUMS.txt
          if-no-files-found: error

  publish-release-assets:
    name: Publish release assets
    needs:
      - build-windows
      - build-macos
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event.inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ProxyVault-win-x64
          path: release-artifacts/windows

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ProxyVault-macos-arm64
          path: release-artifacts/macos-arm64

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ProxyVault-macos-x64
          path: release-artifacts/macos-x64

      - name: Build consolidated checksums
        shell: bash
        run: |
          mkdir -p release-artifacts/final
          cp release-artifacts/windows/ProxyVault-win-x64.zip release-artifacts/final/
          cp release-artifacts/macos-arm64/ProxyVault-macos-arm64.zip release-artifacts/final/
          cp release-artifacts/macos-x64/ProxyVault-macos-x64.zip release-artifacts/final/
          (
            cd release-artifacts/final
            sha256sum ProxyVault-win-x64.zip ProxyVault-macos-arm64.zip ProxyVault-macos-x64.zip > SHA256SUMS.txt
          )

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1 || \
          gh release create "${{ steps.tag.outputs.tag }}" --title "${{ steps.tag.outputs.tag }}" --notes ""

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            release-artifacts/final/ProxyVault-win-x64.zip \
            release-artifacts/final/ProxyVault-macos-arm64.zip \
            release-artifacts/final/ProxyVault-macos-x64.zip \
            release-artifacts/final/SHA256SUMS.txt \
            --clobber
