name: Release Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows archive
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"
          cache: "pip"
          cache-dependency-path: |
            requirements-build.txt
            requirements.txt

      - name: Build portable Windows archive
        shell: pwsh
        run: ./build-windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyVault-win-x64
          path: |
            release/ProxyVault-win-x64.zip
            release/SHA256SUMS.txt
          if-no-files-found: error

  build-macos:
    name: Build macOS ${{ matrix.label }} archive
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: arm64
            pyinstaller_target_arch: arm64
            release_tag: arm64
          - runner: macos-15-intel
            label: x64
            pyinstaller_target_arch: x86_64
            release_tag: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"
          cache: "pip"
          cache-dependency-path: |
            requirements-build.txt
            requirements.txt

      - name: Build portable macOS archive
        shell: bash
        env:
          MACOS_RELEASE_TAG: ${{ matrix.release_tag }}
          PYINSTALLER_TARGET_ARCH: ${{ matrix.pyinstaller_target_arch }}
        run: |
          chmod +x ./build-macos.sh
          ./build-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyVault-macos-${{ matrix.release_tag }}
          path: |
            release/ProxyVault-macos-${{ matrix.release_tag }}.zip
            release/SHA256SUMS.txt
          if-no-files-found: error
